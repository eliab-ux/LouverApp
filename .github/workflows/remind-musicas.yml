name: Lembrete de Músicas para Ministrantes

on:
  schedule:
    # 13h UTC = 10h horário de Brasília (UTC-3)
    - cron: '0 13 * * *'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar Edge Function remind_musicas_ministrantes_v2
        run: |
          curl -sS -X POST 'https://wajbaxzpehfkapqndfwv.supabase.co/functions/v1/remind_musicas_ministrantes_v2' \
            -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{}'
